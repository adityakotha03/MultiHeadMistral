base_model_name: mistralai/Ministral-3-3B-Instruct-2512
dataset_name: mbpp
train_split: train
eval_ratio: 0.05

num_future_heads: 4
head_loss_weights: null
max_seq_len: 1024

use_4bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: bfloat16

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
num_train_steps: 1200
learning_rate: 0.0002
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
lr_scheduler_type: cosine

logging_steps: 10
eval_steps: 100
save_steps: 100
save_total_limit: 3
auto_resume_from_latest: false

seed: 42
output_dir: outputs/mt_3b_demo

report_to_wandb: true
wandb_project: ministral-multitoken
wandb_run_name: mt-heads-demo

benchmark_num_prompts: 30
benchmark_max_new_tokens: 128
